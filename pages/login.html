<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <main>
      <div class="panel-bienvenida">
        <h1 class="titulo">Cine Aurora</h1>
        <div class="contenedor-logo">
          <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" class="logo"/>
        </div>
      </div>

      <form class="login" action="perfil.html">
        <h2>Acceso Clientes</h2>
        <div>
          <label>Email</label>
          <input type="email" placeholder="Ingresa tu email" required />
        </div>
        <div>
          <label>Contraseña</label>
          <input type="password" placeholder="Ingresa tu contraseña" required />
        </div>
        <button type="submit">Ingresar</button>
        <p>¿No eres miembro? <a href="registro.html">Regístrate</a></p>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
