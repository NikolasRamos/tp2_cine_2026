<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Cine Aurora</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/registro.css" />
</head>

<body>

<main class="registro">

  <!-- LADO IZQUIERDO -->
  <section class="registro-left">
    <div class="left-content">
      <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" class="logo" />
      <h2>Bienvenido a Cine Aurora</h2>
      <p>Disfrutá de las mejores películas y reservá tus entradas.</p>
    </div>
  </section>

  <!-- LADO DERECHO -->
  <section class="registro-right">
    <div class="form-wrapper">

      <form action="login.html" class="registro-form">

        <h2>Crear nueva cuenta</h2>

        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" required />
        </div>

        <div class="form-group">
          <label>Fecha de nacimiento</label>
          <input type="date" required />
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" required />
        </div>

        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" required />
        </div>

        <hr />

        <div class="extra-data">

          <div class="extra-header">
            <h3>Datos para ayudar al cine</h3>
            <p>Estos datos nos ayudan a mejorar tu experiencia.</p>
          </div>

          <div class="form-group">
            <label>Color favorito para butacas</label>
            <input type="color" />
          </div>

          <div class="form-group">
            <label>
              Entradas: <span id="valor-entradas">5</span>
            </label>
            <input type="range" min="0" max="10" value="5" id="range-entradas" />
          </div>

          <div class="form-group">
            <label>Género favorito</label>
            <select>
              <option>Acción</option>
              <option>Drama</option>
              <option>Ciencia ficción</option>
              <option>Terror</option>
              <option>Comedia</option>
              <option>Romance</option>
            </select>
          </div>

          <div class="form-group">
            <label>Snack favorito</label>

            <div class="radio-group">
              <label><input type="radio" name="snack" /> Pochoclo dulce</label>
              <label><input type="radio" name="snack" /> Pochoclo salado</label>
              <label><input type="radio" name="snack" /> Chocolate</label>
              <label><input type="radio" name="snack" /> Frutos secos</label>
            </div>

          </div>

        </div>

        <button type="submit" class="btn-primary">Registrarse</button>

      </form>

    </div>
  </section>

</main>

<script>
const range = document.getElementById("range-entradas");
const valor = document.getElementById("valor-entradas");

range.addEventListener("input", () => {
  valor.textContent = range.value;
});
</script>

</body>
</html>
